name: render-and-deploy

# Renders index.html + analytics.html from the live YAML state and
# publishes to GitHub Pages.
#
# Runs on a schedule (not on every push) so the flood of webhook commits
# — tick every 15 min, plus every food/goal/todo write — doesn't trigger
# a render-and-deploy per commit. Those all funnel through the single
# `pages` concurrency lane, where piled-up runs cancel each other and the
# live page starves. A steady cron keeps the dashboard fresh a few times
# an hour; use the Run workflow button (workflow_dispatch) for an instant
# refresh after editing goals/settings.
#
# Cron uses non-:00 offsets to dodge GitHub's top-of-hour throttling.
# Scheduled runs are best-effort on GitHub Actions and may lag under load.

on:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  render-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: Bootstrap settings.yaml from example
        run: |
          if [ ! -f settings.yaml ]; then
            cp settings.example.yaml settings.yaml
          fi

      - name: Render index.html
        env:
          # Injected into index.html so the in-page tap-to-mark JS can
          # call the webhook with the right URL + shared secret. These
          # mirror the values used by the Vercel function itself.
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          SHARED_SECRET: ${{ secrets.SHARED_SECRET }}
        run: python3 render.py

      - name: Prepare site directory
        run: |
          mkdir -p _site
          cp index.html analytics.html style.css _site/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
