name: render-and-deploy

# Renders index.html + analytics.html from the live YAML state and
# publishes to GitHub Pages.
#
# The dashboard is now live-rendered on every page load by /api/render
# (Vercel function in api/index.py), so the static HTML on Pages is only
# a fallback for when JS is off / the API is unreachable / search engines
# crawl. That changes how often we need to rebuild:
#
#   - Cron every 10 min: keeps the fallback "fresh enough" without the
#     per-commit pile-up. State commits no longer trigger rebuilds.
#   - Path-filtered push: instant rebuild when the structure changes
#     (new goal, render code, styles, settings). These deserve an immediate
#     fallback refresh because the live render also reflects them, and we
#     want the static fallback to match what's served live.
#   - workflow_dispatch: manual button for any other reason.
#
# Cron uses non-:00 offsets to dodge GitHub's top-of-hour throttling.
# Scheduled runs are best-effort on GitHub Actions and may lag under load.

on:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
  push:
    branches: [main]
    paths:
      - "goals.yaml"
      - "settings.yaml"
      - "settings.example.yaml"
      - "style.css"
      - "render.py"
      - ".github/workflows/render.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  render-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: Bootstrap settings.yaml from example
        run: |
          if [ ! -f settings.yaml ]; then
            cp settings.example.yaml settings.yaml
          fi

      - name: Render index.html
        env:
          # Injected into index.html so the in-page tap-to-mark JS can
          # call the webhook with the right URL + shared secret. These
          # mirror the values used by the Vercel function itself.
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          SHARED_SECRET: ${{ secrets.SHARED_SECRET }}
        run: python3 render.py

      - name: Prepare site directory
        run: |
          mkdir -p _site
          cp index.html analytics.html style.css _site/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
