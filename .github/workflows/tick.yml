name: tick

# Lightweight ping — hits /api/tick on Vercel. The Vercel handler does
# all the work (reads goals + state, sends ntfy pushes, commits state).
#
# Schedule uses non-:00 offsets (5/20/35/50) to dodge GitHub's
# top-of-hour high-load throttling. Cron is still best-effort on
# GitHub Actions — pair with cron-job.org for guaranteed delivery.

on:
  schedule:
    - cron: "5,20,35,50 * * * *"
  workflow_dispatch:

jobs:
  ping-tick:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/tick on Vercel
        env:
          SHARED_SECRET: ${{ secrets.SHARED_SECRET }}
        run: |
          curl -fsS -X GET \
            -H "X-Secret: $SHARED_SECRET" \
            "https://life-sepia-psi.vercel.app/api/tick" \
            | tee /tmp/tick-response.json
          echo
