name: tick (fallback only)

# Vercel cron is now the primary scheduler — see /api/tick + vercel.json.
# GitHub Actions cron was firing roughly hourly instead of every 15 min
# (well-known throttling for low-priority repos), so it's been disabled
# as the scheduled trigger. Workflow remains available via manual
# workflow_dispatch as a fallback.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: Run tick.py
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          SHARED_SECRET: ${{ secrets.SHARED_SECRET }}
        run: python3 tick.py

      - name: Commit dedup state if changed
        run: |
          git config user.name "tick-bot"
          git config user.email "noreply@github.com"
          if [ -n "$(git status --porcelain state/)" ]; then
            git add state/
            git pull --rebase --autostash origin main
            git commit -m "tick (manual): record nudges sent at $(date -u +%H:%M) UTC"
            git push
          else
            echo "no state changes — nothing to commit"
          fi
