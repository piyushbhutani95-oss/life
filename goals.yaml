# Your recurring daily goals.
#
# Edit by talking to Claude in plain English:
#   "Add a goal: meditate 15 minutes, prefer mornings"
#   "Remove reading"
#   "Make workout high priority"
#   "Pause guitar for now"  (sets active: false)
#
# Schema (per goal):
#   id:              short slug, lowercase, used internally (must be unique)
#   title:           what shows on the dashboard
#   description:     optional; shown under the title in muted text
#   target_minutes:  rough duration; null/omit for "binary" check-ins
#   priority:        low | medium | high
#                    high   → nudged earlier and louder if undone
#                    low    → quick check-ins; only nudged late
#   window:          morning | afternoon | evening | any
#   active:          true / false — set false to pause without deleting
#   nudge_at:        when this goal first nudges. Either a single "HH:MM"
#                    string, or a list ["HH:MM", ...] for multi check-ins.
#                    Omit for "TBD — flexible, no nudge until decided".

goals:

  # ── morning anchor ──────────────────────────────────
  - id: wake-early
    title: Wake up early
    priority: high
    window: morning
    active: true
    nudge_at: "06:00"   # check-in if I haven't woken/marked done by then

  # ── mind & practice (early-morning block) ───────────
  - id: meditate
    title: Meditate
    target_minutes: 15
    priority: medium
    window: morning
    active: true
    nudge_at: "06:00"

  - id: journal
    title: Journal
    target_minutes: 15
    priority: medium
    window: morning   # actually morning, not evening — done first thing
    active: true
    nudge_at: "06:15"

  # ── body & care (quick check-ins) ───────────────────
  - id: bath
    title: Bath
    target_minutes: 10
    priority: low
    window: morning
    active: true
    nudge_at: "06:45"   # before the 7am meeting

  - id: skincare
    title: Skin care
    target_minutes: 5
    priority: low
    window: morning
    active: true
    nudge_at: "06:45"   # right after bath

  - id: multivitamins
    title: Multivitamins
    target_minutes: 1
    priority: low
    window: morning
    active: true
    nudge_at: "08:00"

  - id: b12
    title: B12
    target_minutes: 1
    priority: low
    window: morning
    active: true
    nudge_at: "08:00"

  - id: creatine
    title: Creatine
    target_minutes: 1
    priority: low
    window: any
    active: true
    nudge_at: "08:00"

  # ── movement ────────────────────────────────────────
  - id: workout
    title: Workout
    description: Gym, run, or 20 min bodyweight
    target_minutes: 45
    priority: high
    window: any
    active: true
    nudge_at: "13:00"   # flexible: usually morning, sometimes evening — midday catch-up

  - id: step-out
    title: Step out
    description: Fresh air, ideally without headphones
    target_minutes: 15
    priority: medium
    window: afternoon
    active: true
    nudge_at: "18:00"

  # ── deep work (flexible — evening catch-ups for now) ─
  - id: write
    title: Write
    target_minutes: 60
    priority: high
    window: morning
    active: true
    nudge_at: "17:00"   # tentative — refine after a week of usage

  - id: code
    title: Code
    target_minutes: 90
    priority: high
    window: any
    active: true
    nudge_at: "18:30"   # tentative — refine after a week of usage

  - id: language
    title: Language
    target_minutes: 20
    priority: medium
    window: any
    active: true
    nudge_at: "20:30"   # tentative — refine after a week of usage

  - id: read
    title: Read
    description: A book, not feeds
    target_minutes: 30
    priority: high
    window: evening
    active: true
    nudge_at: "21:30"   # before bed

  # ── practice ────────────────────────────────────────
  - id: guitar
    title: Practice guitar
    target_minutes: 30
    priority: medium
    window: any
    active: true
    nudge_at: "20:00"   # flexible: 6:30am or 8pm — default 8pm

  - id: course
    title: Course
    target_minutes: 30
    priority: medium
    window: evening
    active: true
    nudge_at: "19:00"   # tentative

  # ── people ──────────────────────────────────────────
  - id: talk-to-people
    title: Talk to people
    description: Real conversation — call, in person, voice note
    priority: medium
    window: evening
    active: true
    nudge_at: "20:00"   # evening check-in

  - id: respond-to-people
    title: Respond to people
    description: Clear messages, don't leave anyone hanging
    priority: medium
    window: any
    active: true
    nudge_at: ["10:00", "15:00", "21:00"]   # multi check-in
