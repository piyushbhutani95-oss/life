# Copy this to settings.yaml (which is gitignored) and fill in your values.

user:
  name: Piyush
  timezone: Asia/Kolkata   # IANA tz name; change if you're not on IST

# When does "today" begin/end for the watcher's purposes?
# rollover_hour: at this local hour, the day flips. Late-night work before
# rollover still counts toward "yesterday".
day:
  start_hour: 5
  end_hour: 23
  rollover_hour: 3

# Times when nudges are silenced. List of "HH:MM-HH:MM" windows.
# Wraparound (overnight) is OK.
quiet_hours:
  - "23:00-05:30"   # overnight
  - "07:00-08:00"   # daily meeting

# ntfy is the "mailbox" — a free push service. Pick a long random topic name
# (treat it like a password). Subscribe to it from the ntfy Android app.
ntfy:
  server: https://ntfy.sh
  topic: life-os-CHANGE-ME-TO-LONG-RANDOM-STRING

# Google Calendar — used by schedule.py and tick.py (later milestones).
calendar:
  id: primary
  event_prefix: "🎯 Life:"
  marker: "auto-scheduled-by:life-os"
  color_id: 9

# How "behind" do you have to be before each escalation level fires?
# Numbers are fractions of the waking day elapsed.
escalation:
  soft_after: 0.30
  firm_after: 0.50
  hard_after: 0.75
